services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      AGENT_TIMEOUT_MS: "10000"
    restart: unless-stopped

  agent-1:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:3000
      AGENT_ID: agent-1
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-1000}
      SSH_ADDR: 127.0.0.1:22
    depends_on:
      - backend
    restart: unless-stopped

  agent-2:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:3000
      AGENT_ID: agent-2
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-1000}
      SSH_ADDR: 127.0.0.1:22
    depends_on:
      - backend
    restart: unless-stopped

  agent-3:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:3000
      AGENT_ID: agent-3
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-1000}
      SSH_ADDR: 127.0.0.1:22
    depends_on:
      - backend
    restart: unless-stopped
